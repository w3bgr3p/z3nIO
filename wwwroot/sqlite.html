<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>z3nIO | SQLite</title>
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            font-size: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--bg1);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header h1 { font-size: 15px; color: var(--accent); flex-shrink: 0; }

        .file-label {
            font-size: 11px;
            color: var(--text2);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input[type="file"] { display: none; }

        .btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.primary { border-color: var(--accent); color: var(--accent); }

        .main { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-head {
            padding: 5px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--bg1);
            flex-shrink: 0;
        }

        .table-list { flex: 1; overflow-y: auto; }

        .table-item {
            padding: 6px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            color: var(--text2);
            font-size: 11px;
            transition: background 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .table-item:hover { background: var(--bg2); color: var(--text); }
        .table-item.active { background: var(--bg2); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }

        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .query-bar {
            display: flex;
            gap: 6px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg1);
            flex-shrink: 0;
            align-items: center;
        }

        .query-input {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: monospace;
            font-size: 11px;
            padding: 4px 8px;
            outline: none;
        }
        .query-input:focus { border-color: var(--accent); }

        /* column manager bar */
        .col-bar {
            display: flex;
            gap: 4px;
            padding: 4px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg1);
            flex-shrink: 0;
            flex-wrap: wrap;
            align-items: center;
            min-height: 28px;
        }

        .col-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 7px;
            font-size: 10px;
            color: var(--text2);
            cursor: grab;
            user-select: none;
            transition: border-color 0.1s, color 0.1s;
            white-space: nowrap;
        }
        .col-chip:active { cursor: grabbing; }
        .col-chip.visible { color: var(--text); border-color: var(--border); }
        .col-chip.hidden-col { opacity: 0.4; }
        .col-chip.drag-over { border-color: var(--accent); }
        .col-chip.dragging { opacity: 0.3; }

        .col-chip-eye {
            font-size: 10px;
            cursor: pointer;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .col-chip-eye:hover { opacity: 1; }

        .status-bar {
            padding: 3px 10px;
            font-size: 10px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            background: var(--bg1);
            flex-shrink: 0;
            min-height: 20px;
        }
        .status-bar.err { color: #f87171; }

        .table-wrap { flex: 1; overflow: auto; }

        table { border-collapse: collapse; width: max-content; min-width: 100%; }

        thead th {
            position: sticky;
            top: 0;
            background: var(--bg1);
            border: 1px solid var(--border);
            padding: 4px 10px;
            text-align: left;
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            z-index: 1;
        }

        tbody td {
            border: 1px solid var(--border);
            padding: 3px 10px;
            font-size: 11px;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        tbody tr:hover td { background: var(--bg2); }

        td.is-null { color: var(--text2); font-style: italic; cursor: default; }
        td a { color: var(--accent); text-decoration: none; }
        td a:hover { text-decoration: underline; }

        .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text2);
            font-size: 13px;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 14px;
            border-radius: 4px;
            font-size: 11px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 9999;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <h1>SQLite</h1>
    <span class="file-label" id="fileLabel">No file selected</span>
    <input type="file" id="filePicker" accept=".db,.sqlite,.sqlite3">
    <button class="btn primary" onclick="document.getElementById('filePicker').click()">Open File</button>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-head">Tables</div>
        <div class="table-list" id="tableList"></div>
    </div>

    <div class="content">
        <div class="query-bar">
            <input class="query-input" id="queryInput" type="text" placeholder="SELECT * FROM table LIMIT 100">
            <button class="btn primary" onclick="runQuery()">Run</button>
        </div>
        <div class="col-bar" id="colBar"></div>
        <div class="status-bar" id="statusBar"></div>
        <div class="table-wrap" id="tableWrap">
            <div class="empty">Open a .db file to start</div>
        </div>
    </div>
</div>

<div id="toast">Copied</div>

<script>
    let currentFile  = null;
    // source data from last query
    let lastColumns  = [];
    let lastRows     = [];
    // view state: ordered list of column names, set of hidden names
    let colOrder     = [];
    let hiddenCols   = new Set();

    // ── file picker ────────────────────────────────────────────────────────────

    document.getElementById('filePicker').addEventListener('change', function () {
        const f = this.files[0];
        if (!f) return;
        currentFile = f;
        document.getElementById('fileLabel').textContent = f.name;
        colOrder = []; hiddenCols = new Set();
        loadTables();
        this.value = '';
    });

    document.getElementById('queryInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') runQuery();
    });

    // ── server calls ───────────────────────────────────────────────────────────

    async function loadTables() {
        if (!currentFile) return;
        setStatus('Loading...');
        document.getElementById('tableList').innerHTML = '';
        clearTable();

        try {
            const buf = await currentFile.arrayBuffer();
            const res = await fetch('/sqlite-viewer/tables', {
                method: 'POST',
                headers: { 'Content-Type': 'application/octet-stream' },
                body: buf
            });
            const data = await res.json();
            if (data.error) { setStatus(data.error, true); return; }
            renderTableList(data.tables);
            setStatus(`${data.tables.length} table(s)`);
        } catch (e) { setStatus(e.message, true); }
    }

    async function execQuery(sql) {
        if (!currentFile) { setStatus('No file open', true); return; }
        setStatus('Running...');
        clearTable();

        try {
            const buf = await currentFile.arrayBuffer();
            const res = await fetch('/sqlite-viewer/query?' + new URLSearchParams({ sql }), {
                method: 'POST',
                headers: { 'Content-Type': 'application/octet-stream' },
                body: buf
            });
            const data = await res.json();
            if (data.error) { setStatus(data.error, true); return; }

            lastColumns = data.columns;
            lastRows    = data.rows;
            // init colOrder only when columns change
            colOrder  = data.columns.slice();
            hiddenCols = new Set();

            renderColBar();
            renderTable();
            setStatus(`${data.rows.length} row(s)`);
        } catch (e) { setStatus(e.message, true); }
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────

    function renderTableList(tables) {
        const el = document.getElementById('tableList');
        el.innerHTML = '';
        tables.forEach(t => {
            const d = document.createElement('div');
            d.className = 'table-item';
            d.textContent = t;
            d.title = t;
            d.onclick = () => selectTable(t);
            el.appendChild(d);
        });
    }

    function selectTable(name) {
        document.querySelectorAll('.table-item').forEach(el =>
            el.classList.toggle('active', el.textContent === name)
        );
        const sql = `SELECT * FROM "${name}" LIMIT 500`;
        document.getElementById('queryInput').value = sql;
        execQuery(sql);
    }

    function runQuery() {
        const sql = document.getElementById('queryInput').value.trim();
        if (sql) execQuery(sql);
    }

    // ── column bar (drag + hide) ───────────────────────────────────────────────

    let dragSrc = null;

    function renderColBar() {
        const bar = document.getElementById('colBar');
        bar.innerHTML = '';

        colOrder.forEach(col => {
            const chip = document.createElement('div');
            chip.className = 'col-chip' + (hiddenCols.has(col) ? ' hidden-col' : ' visible');
            chip.draggable = true;
            chip.dataset.col = col;

            const eye = document.createElement('span');
            eye.className = 'col-chip-eye';
            eye.textContent = hiddenCols.has(col) ? '○' : '●';
            eye.title = hiddenCols.has(col) ? 'Show' : 'Hide';
            eye.onclick = (e) => { e.stopPropagation(); toggleCol(col); };

            const label = document.createElement('span');
            label.textContent = col;

            chip.appendChild(eye);
            chip.appendChild(label);

            // drag events
            chip.addEventListener('dragstart', e => {
                dragSrc = col;
                chip.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            chip.addEventListener('dragend', () => {
                chip.classList.remove('dragging');
                dragSrc = null;
                bar.querySelectorAll('.col-chip').forEach(c => c.classList.remove('drag-over'));
            });
            chip.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                bar.querySelectorAll('.col-chip').forEach(c => c.classList.remove('drag-over'));
                if (dragSrc && dragSrc !== col) chip.classList.add('drag-over');
            });
            chip.addEventListener('drop', e => {
                e.preventDefault();
                if (!dragSrc || dragSrc === col) return;
                const from = colOrder.indexOf(dragSrc);
                const to   = colOrder.indexOf(col);
                colOrder.splice(from, 1);
                colOrder.splice(to, 0, dragSrc);
                renderColBar();
                renderTable();
            });

            bar.appendChild(chip);
        });
    }

    function toggleCol(col) {
        if (hiddenCols.has(col)) hiddenCols.delete(col);
        else hiddenCols.add(col);
        renderColBar();
        renderTable();
    }

    // ── table render ───────────────────────────────────────────────────────────

    function renderTable() {
        const wrap = document.getElementById('tableWrap');
        wrap.innerHTML = '';

        // visible columns in current order
        const visible = colOrder.filter(c => !hiddenCols.has(c));
        // index map: visible col name → original index in lastColumns
        const idxMap  = {};
        lastColumns.forEach((c, i) => idxMap[c] = i);

        const tbl   = document.createElement('table');
        const thead = document.createElement('thead');
        const hrow  = document.createElement('tr');
        visible.forEach(c => {
            const th = document.createElement('th');
            th.textContent = c;
            hrow.appendChild(th);
        });
        thead.appendChild(hrow);
        tbl.appendChild(thead);

        const tbody = document.createElement('tbody');
        lastRows.forEach(row => {
            const tr = document.createElement('tr');
            visible.forEach(c => {
                const val = row[idxMap[c]];
                const td  = document.createElement('td');
                if (val === null || val === undefined) {
                    td.textContent = 'NULL';
                    td.className = 'is-null';
                } else if (typeof val === 'string' && (val.startsWith('http://') || val.startsWith('https://'))) {
                    const a = document.createElement('a');
                    a.href = val; a.target = '_blank'; a.rel = 'noopener noreferrer';
                    a.textContent = val;
                    a.onclick = e => e.stopPropagation();
                    td.appendChild(a);
                } else {
                    td.textContent = val;
                    td.onclick = () => copyVal(val);
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        wrap.appendChild(tbl);
    }

    function clearTable() {
        document.getElementById('tableWrap').innerHTML = '';
        document.getElementById('colBar').innerHTML = '';
        lastColumns = []; lastRows = [];
    }

    function copyVal(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1200);
        });
    }

    function setStatus(msg, isErr = false) {
        const el = document.getElementById('statusBar');
        el.textContent = msg;
        el.className = 'status-bar' + (isErr ? ' err' : '');
    }
</script>
</body>
</html>
