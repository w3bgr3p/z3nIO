<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/icons.js"></script>
    <title>z3nIO | Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11px; overflow: hidden; height: 100vh;
            display: flex; justify-content: center;
        }
        #app {
            width: 100%;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* ── Header ── */
        .main-header {
            background: var(--bg1); padding: 6px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0; display: flex; align-items: center; gap: 10px;
        }
        .main-header h1 { font-size: 13px; font-weight: 700; color: var(--accent); }
        .header-stats { display: flex; gap: 14px; font-size: 10px; color: var(--text2); }
        .stat-item { display: flex; gap: 4px; align-items: center; }
        .stat-val  { color: var(--text); font-weight: 600; }
        .stat-running { color: var(--green); }
        .stat-error   { color: var(--red); }
        .header-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

        /* ── Layout ── */
        .content { display: flex; flex: 1; overflow: hidden; gap: 5px; padding: 5px; }
        .tasks-panel {
            width: 340px; flex-shrink: 0; display: flex; flex-direction: column;
            border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
            background: var(--bg);
        }
        .list-toolbar {
            padding: 6px 8px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .list-toolbar input {
            flex: 1; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 3px; padding: 3px 7px; color: var(--text); font-size: 11px;
        }
        .list-toolbar input:focus { outline: none; border-color: var(--accent); }
        .list-scroll { flex: 1; overflow-y: auto; }

        /* ── List rows ── */
        .group-header {
            padding: 5px 10px 4px;
            display: flex; align-items: center; gap: 6px;
            background: var(--bg1);
            border-top: 2px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 2;
            cursor: pointer; user-select: none;
        }
        .group-header:hover { background: var(--bg2); }
        .group-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .group-name { font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
        .group-count { font-size: 9px; color: var(--text2); background: var(--bg2); padding: 1px 5px; border-radius: 8px; }
        .group-chevron { font-size: 9px; color: var(--text2); transition: transform 0.15s; display: inline-block; }
        .group-chevron.collapsed { transform: rotate(-90deg); }

        .schedule-row {
            padding: 6px 10px 6px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: background 0.08s;
        }
        .schedule-row.group-child { padding-left: 24px; border-left: 2px solid var(--border); }
        .schedule-row:hover  { background: var(--bg2); }
        .schedule-row.active { background: var(--bg3); }
        .schedule-row.row-disabled { opacity: 0.45; }
        .ungrouped-separator { border-top: 2px solid var(--border); }

        .row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .row-dot.enabled  { background: var(--green); }
        .row-dot.disabled { background: var(--border); }

        .row-info { flex: 1; min-width: 0; }
        .row-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-sub  { font-size: 9px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Left panel ── */
        .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
        .task-status {
            font-size: 9px;
            padding: 1px 7px;
            border-radius: 4px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.2px;
            text-transform: uppercase; }
        .task-status.newbie  { background: var(--yellow-tint); color: var(--yellow); }
        .task-status.running { background: var(--green-tint); color: var(--text-hi); border: 1px solid var(--green-bg); }
        .task-status.done    { background: var(--purple-tint); color: var(--green); }
        .task-status.fail    { background: var(--red-tint); color: var(--red); border: 1px solid var(--red-bg); }
        .task-status.planned { background: var(--blue-tint); color: var(--accent); border: 1px solid var(--blue-border); }
        .task-status.paused  { background: var(--bg2); color: var(--text2); }
        .row-counts { font-size: 9px; color: var(--text2); display: flex; gap: 4px; align-items: center; }
        .row-done   { color: var(--green, #3fb950); font-weight: 600; }
        .row-total  { color: var(--text2); }




        /* ── Resizer ── */
        .resizer { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; transition: background 0.15s; }
        .resizer:hover { background: var(--accent); opacity: 0.5; }

        /* ── Detail panel ── */
        .right-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; gap: 0; min-width: 0; }
        .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }

        .detail-header {
            padding: 8px 14px 0; border-bottom: 1px solid var(--border);
            flex-shrink: 0; background: var(--bg1);
        }
        .detail-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .detail-sub   { font-size: 10px; color: var(--text2); margin-bottom: 6px; font-family: monospace; }
        .detail-actions { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
        .action-group { display: flex; gap: 2px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg2); }

        /* ── Panel header (zp7-style) ── */
        .panel-header {
            background: var(--bg1); padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 7px; flex-shrink: 0;
        }
        .panel-title { font-size: 12px; font-weight: 600; color: var(--accent); }
        .count-badge {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
            padding: 1px 6px; font-size: 10px; color: var(--text2);
        }

        /* ── Executor tag filter bar ── */
        .exec-filter-bar {
            background: var(--bg1); padding: 3px 8px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
            flex-shrink: 0; min-height: 24px;
        }
        .exec-filter-bar:empty { display: none; }
        .tag-filter-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-right: 2px; }
        .tag-chip {
            font-size: 10px; padding: 1px 7px; border-radius: 10px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text2); cursor: pointer; user-select: none; transition: all 0.12s; white-space: nowrap;
        }
        .tag-chip:hover { border-color: var(--accent); color: var(--text); }
        .tag-chip.active { background: rgba(56,139,253,0.15); border-color: var(--accent); color: var(--accent); }
        .tag-chip.clear-chip { color: var(--text2); border-style: dashed; }
        .tag-chip.clear-chip:hover { color: var(--red, #f85149); border-color: var(--red, #f85149); }

        /* ── Executor badge in rows ── */
        .exec-tag {
            display: inline-block; font-size: 8px; padding: 0px 5px; border-radius: 8px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text2); margin-right: 4px; vertical-align: middle; font-family: monospace;
        }

        .detail-tabs { display: flex; gap: 0; }
        .dtab {
            padding: 5px 14px; cursor: pointer; font-size: 11px; color: var(--text2);
            border-bottom: 2px solid transparent; transition: color 0.1s;
            user-select: none;
        }
        .dtab:hover  { color: var(--text); }
        .dtab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── Detail body ── */
        .detail-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 12px; }

        /* ── Global stats (no selection) — kept for gsCard/infoRow helpers ── */
        .gs-rows  { max-width: 320px; }

        /* ── Nav grid (home.html, verbatim) ── */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            width: 100%;
            max-width: 860px;
        }
        .nav-card {
            background: var(--surface, var(--bg1));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg, 8px);
            padding: 20px 22px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            position: relative;
            overflow: hidden;
        }
        .nav-card:hover {
            border-color: var(--card-color, var(--accent));
            background: var(--surface2, var(--bg2));
            transform: translateY(-1px);
        }
        .nav-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--card-color, var(--accent));
            opacity: 0;
            transition: opacity 0.15s;
        }
        .nav-card:hover::before { opacity: 1; }
        .card-icon  { font-size: 24px; line-height: 1; }
        .card-icon svg { width: 32px; height: 32px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-hi, var(--text)); }
        .card-desc  { font-size: 11px; color: var(--text-dim, var(--text2)); line-height: 1.5; }
        .card-badge {
            margin-top: auto;
            padding-top: 10px;
            font-size: 10px;
            color: var(--card-color, var(--accent));
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ── Settings form ── */
        .form-grid { display: grid; grid-template-columns: 130px 1fr; gap: 7px 10px; align-items: start; max-width: 680px; }
        .form-label { color: var(--text2); padding-top: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; color: var(--text); font-size: 11px; width: 100%; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        select.form-input { cursor: pointer; }
        .form-section { grid-column: 1 / -1; margin-top: 6px; padding: 4px 0 4px 8px; border-left: 2px solid var(--accent); color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-actions { grid-column: 1 / -1; display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

        /* ── Execution / Scheduler info ── */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px;  }

        .detail-section { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; }
        .info-card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; border-bottom: 1px solid var(--border); }
        .info-row:last-child { border-bottom: none; }
        .info-key { font-size: 10px; color: var(--text2); }
        .info-val { font-size: 11px; color: var(--text); font-weight: 500; text-align: right; max-width: 65%; word-break: break-all; }
        .info-val.green { color: var(--green, #3fb950); }
        .info-val.red   { color: var(--red, #f85149); }
        .info-val.accent { color: var(--accent); }

        /* ── Output tab ── */
        .output-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .live-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--green-bg, rgba(63,185,80,0.15)); color: var(--green, #3fb950); animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .output-box {
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
            overflow-y: auto; height: calc(100% - 40px); min-height: 100px;
        }
        .out-line { padding: 2px 10px; border-bottom: 1px solid var(--bg2); font-family: 'Consolas', monospace; font-size: 10px; line-height: 1.6; word-break: break-all; }
        .out-line.ERROR   { color: var(--red, #f85149); }
        .out-line.WARNING { color: var(--yellow, #d29922); }
        .out-line.INFO    { color: var(--text); }
        .out-line.DEBUG   { color: var(--text2); }
        .out-line.empty   { color: var(--text2); padding: 12px; text-align: center; }

        /* ── Horizontal resizer (detail-panel ↕ bottom-panels) ── */
        .h-resizer {
            height: 5px; background: var(--bg2); cursor: row-resize; flex-shrink: 0;
            margin: 1px 0; border-radius: 2px;
        }
        .h-resizer:hover { background: var(--accent); }

        /* ── Vertical resizer inside bottom-panels ── */
        .v-resizer {
            width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0;
            transition: background 0.15s;
        }
        .v-resizer:hover { background: var(--accent); opacity: 0.5; }

        /* ── Logs + HTTP bottom panels ── */
        .bottom-panels { display: flex; flex-shrink: 0; height: 220px; gap: 0; overflow: hidden; }
        .log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; background: var(--bg1); min-width: 80px; }
        .log-panel-header { padding: 4px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .log-panel-title { font-size: 10px; font-weight: 700; color: var(--accent); flex: 1; display: flex; align-items: center; gap: 5px; }
        .log-panel-title .icon { font-size: 11px; }
        .log-panel-filter { display: flex; gap: 4px; align-items: center; }
        .log-panel-filter select,
        .log-panel-filter input {
            background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
            padding: 2px 5px; color: var(--text); font-size: 10px;
        }
        .log-panel-filter select { cursor: pointer; }
        .log-panel-scroll { flex: 1; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 10px; }
        .log-row { display: flex; gap: 6px; padding: 2px 8px; border-bottom: 1px solid var(--border); align-items: baseline; }
        .log-row:hover { background: var(--bg2); }
        .log-time    { color: var(--text2); white-space: nowrap; flex-shrink: 0; font-size: 9px; }
        .log-level   { width: 40px; flex-shrink: 0; font-weight: 700; font-size: 9px; }
        .log-level.INFO  { color: var(--accent); }
        .log-level.WARN  { color: var(--yellow, #d29922); }
        .log-level.ERROR { color: var(--red, #f85149); }
        .log-acc     { width: 10px; flex-shrink: 0; color: var(--green, #3fb950); font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-caller  { width: 200px; flex-shrink: 0; color: var(--text2); font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-msg     { flex: 1; color: var(--text); word-break: break-all; line-height: 1.5; }
        .http-row { display: flex; gap: 6px; padding: 2px 8px; border-bottom: 1px solid var(--border); align-items: baseline; }
        .http-row:hover { background: var(--bg2); }
        .http-method { width: 35px; flex-shrink: 0; font-weight: 700; font-size: 9px; color: var(--accent); }
        .http-status { width: 28px; flex-shrink: 0; font-size: 9px; font-weight: 600; }
        .http-status.s2xx { color: var(--green, #3fb950); }
        .http-status.s4xx { color: var(--yellow, #d29922); }
        .http-status.s5xx { color: var(--red, #f85149); }
        .http-url    { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 9px; }
        .http-dur    { flex-shrink: 0; color: var(--text2); font-size: 9px; }
        .log-empty   { color: var(--text2); text-align: center; padding: 16px; font-size: 10px; }
        .panel-refresh { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text2); cursor: pointer; font-size: 10px; padding: 1px 6px; }
        .panel-refresh:hover { color: var(--text); border-color: var(--text2); }

        /* ── Buttons ── */
        .btn { padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; background: var(--bg2); color: var(--text); transition: opacity 0.1s; }
        .btn:hover  { background: var(--bg3); }
        .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.primary:hover { opacity: 0.85; }
        .btn.danger  { background: transparent; color: var(--red, #f85149); border-color: var(--red, #f85149); }
        .btn.danger:hover  { background: var(--red-bg, rgba(248,81,73,0.15)); }
        .btn.green   { background: transparent; color: var(--green, #3fb950); border-color: var(--green, #3fb950); }
        .btn.green:hover { background: var(--green-bg, rgba(63,185,80,0.1)); }
        .btn.accent  { background: transparent; color: var(--accent); border-color: var(--accent); }
        .btn.sm      { padding: 2px 7px; font-size: 10px; }
        .btn.stop    { background: transparent; color: var(--red, #f85149); border-color: var(--red, #f85149); }

        /* ── Schedule builder ── */
        .trigger-row { display: flex; gap: 8px; align-items: center; }
        .trigger-row .form-input { flex: 1; }
        .wd-btn { padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; font-size: 10px; background: var(--bg2); color: var(--text2); user-select: none; }
        .wd-btn.wd-on { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ── Dialog ── */
        #dialogOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: center; justify-content: center; }
        #dialogOverlay.open { display: flex; }
        #dialogBox { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; min-width: 260px; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
        #dialogTitle { font-weight: 700; font-size: 13px; }
        #dialogMsg   { color: var(--text2); font-size: 11px; line-height: 1.5; }
        #dialogInput { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; color: var(--text); font-size: 11px; display: none; width: 100%; }
        #dialogButtons { display: flex; gap: 8px; justify-content: flex-end; }

        /* ── Payload modals ── */
        .pm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1001; align-items: center; justify-content: center; }
        .pm-overlay.open { display: flex; }
        .pm-modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; width: 620px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .pm-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
        .pm-header h3 { font-size: 13px; color: var(--text); flex: 1; }
        .pm-close { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
        .pm-close:hover { color: var(--text); }
        .pm-body { flex: 1; overflow-y: auto; padding: 12px 14px; min-height: 0; }
        .pm-footer { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; }
        .schema-field-row { display: grid; grid-template-columns: 16px 1fr 110px 1fr 28px; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--bg2); }
        .schema-field-row:last-child { border-bottom: none; }
        .schema-field-row.dragging { opacity: 0.4; }
        .schema-field-row.drag-over { border-top: 2px solid var(--accent); }
        .schema-drag-handle { color: var(--text2); cursor: grab; font-size: 12px; display: flex; align-items: center; justify-content: center; user-select: none; opacity: 0.5; }
        .schema-drag-handle:hover { opacity: 1; color: var(--accent); }
        .schema-drag-handle:active { cursor: grabbing; }
        .schema-input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 7px; color: var(--text); font-size: 11px; width: 100%; }
        .schema-input:focus { outline: none; border-color: var(--accent); }
        .schema-del { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text2); cursor: pointer; font-size: 12px; width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; }
        .schema-del:hover { border-color: var(--red, #f85149); color: var(--red, #f85149); }
        .schema-col-header { display: grid; grid-template-columns: 16px 1fr 110px 1fr 28px; gap: 6px; padding: 0 0 5px; color: var(--text2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
        .values-field { margin-bottom: 10px; }
        .values-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; display: flex; gap: 6px; align-items: baseline; }
        .values-key   { font-size: 9px; color: var(--text2); font-family: monospace; opacity: 0.6; }
        .values-input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 7px; color: var(--text); font-size: 11px; width: 100%; }
        .values-input:focus { outline: none; border-color: var(--accent); }
        .section-div { margin: 8px 0 5px; padding: 3px 8px; background: var(--bg2); border-left: 2px solid var(--accent); border-radius: 0 3px 3px 0; font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }

        /* scrollbars */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
<div id="app">
    <div class="main-header">
        <h1>Tasker</h1>
        <div class="header-stats" id="headerStats"></div>
        <div class="header-right">
            <button class="btn sm" onclick="loadList()">↺</button>
        </div>
    </div>

    <div class="content">
        <!-- LIST -->
        <div class="tasks-panel" id="tasksPanel">
            <div class="panel-header">
                <span class="panel-title">Schedules</span>
                <span class="count-badge" id="listCount">0</span>
                <div style="margin-left:auto;display:flex;gap:5px;">
                    <input type="text" id="searchInput" placeholder="Search..." oninput="filterList()"
                           style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 7px;color:var(--text);font-size:10px;width:100px;">
                    <button class="btn sm" onclick="newSchedule()">+ New</button>
                </div>
            </div>
            <div class="exec-filter-bar" id="execFilterBar"></div>
            <div class="list-scroll" id="listScroll" onclick="if(!event.target.closest('.schedule-row'))deselect()"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <!-- RIGHT COLUMN -->
        <div class="right-col" id="rightCol">

            <!-- DETAIL -->
            <div class="detail-panel" id="detailPanel">
                <div id="detailHeader" style="display:none" class="detail-header">
                    <div class="detail-title" id="detailTitle"></div>
                    <div class="detail-sub"   id="detailSub"></div>
                    <div class="detail-actions" id="detailActions"></div>
                    <div class="detail-tabs">
                        <div class="dtab active" data-tab="execution" onclick="switchTab('execution')">Execution</div>
                        <div class="dtab"        data-tab="settings"  onclick="switchTab('settings')">Settings</div>
                        <div class="dtab"        data-tab="output"    onclick="switchTab('output')">Output</div>
                    </div>
                </div>
                <div class="detail-body" id="detailBody">
                    <div class="empty-state">Select a schedule or create a new one</div>
                </div>
            </div>

            <div class="h-resizer" id="hResizer" style="display:none"></div>

            <div class="bottom-panels" id="bottomPanels" style="display:none">
                <!-- Logs -->
                <div class="log-panel" id="logPanelLogs">
                    <div class="log-panel-header">
                        <div class="log-panel-title"><span class="icon">📋</span> Logs</div>
                        <div class="log-panel-filter">
                            <select id="logLevel" onchange="loadLogs()">
                                <option value="">All Levels</option>
                                <option>INFO</option><option>WARNING</option><option>ERROR</option><option>DEBUG</option>
                            </select>
                            <input id="logLimit" type="number" value="50" min="10" max="500" style="width:46px" onchange="loadLogs()">
                            <button class="panel-refresh" onclick="loadLogs()">↺</button>
                            <button class="panel-refresh" onclick="clearLogsPanel()" style="color:var(--red,#f85149);border-color:var(--red,#f85149);" title="Clear logs for this task">🗑</button>
                        </div>
                    </div>
                    <div class="log-panel-scroll" id="logsScroll"><div class="log-empty">No logs</div></div>
                </div>
                <div class="v-resizer" id="vResizer"></div>
                <!-- HTTP -->
                <div class="log-panel" id="logPanelHttp">
                    <div class="log-panel-header">
                        <div class="log-panel-title"><span class="icon">🌐</span> HTTP</div>
                        <div class="log-panel-filter">
                            <select id="httpMethod" onchange="loadHttp()">
                                <option value="">All Methods</option>
                                <option>GET</option><option>POST</option><option>PUT</option>
                            </select>
                            <select id="httpStatus" onchange="loadHttp()">
                                <option value="">All Status</option>
                                <option value="2">2xx</option><option value="4">4xx</option><option value="5">5xx</option>
                            </select>
                            <input id="httpUrl" placeholder="URL..." style="width:80px" oninput="loadHttp()">
                            <input id="httpLimit" type="number" value="50" min="10" max="500" style="width:46px" onchange="loadHttp()">
                            <button class="panel-refresh" onclick="loadHttp()">↺</button>
                            <button class="panel-refresh" onclick="clearHttpPanel()" style="color:var(--red,#f85149);border-color:var(--red,#f85149);" title="Clear HTTP logs for this task">🗑</button>
                        </div>
                    </div>
                    <div class="log-panel-scroll" id="httpScroll"><div class="log-empty">No traffic</div></div>
                </div>
            </div>

        </div><!-- /right-col -->
    </div>
</div>

<!-- Dialog -->
<div id="dialogOverlay">
    <div id="dialogBox">
        <div style="display:flex;align-items:center;gap:9px;">
            <span id="dialogIcon"></span><span id="dialogTitle"></span>
        </div>
        <div id="dialogMsg"></div>
        <input id="dialogInput" type="text" autocomplete="off">
        <div id="dialogButtons"></div>
    </div>
</div>

<!-- Schema modal -->
<div id="schemaOverlay" class="pm-overlay" onclick="if(event.target===this)closeSchemaModal()">
    <div class="pm-modal">
        <div class="pm-header">
            <h3 id="schemaTitle">Schema</h3>
            <button class="pm-close" onclick="closeSchemaModal()">✕</button>
        </div>
        <div class="pm-body" id="schemaBody"></div>
        <div class="pm-footer">
            <button class="btn" onclick="closeSchemaModal()">Cancel</button>
            <button class="btn primary" onclick="saveSchema()">Save Schema</button>
        </div>
    </div>
</div>

<!-- Values modal -->
<div id="valuesOverlay" class="pm-overlay" onclick="if(event.target===this)closeValuesModal()">
    <div class="pm-modal">
        <div class="pm-header">
            <h3 id="valuesTitle">Values</h3>
            <button class="pm-close" onclick="closeValuesModal()">✕</button>
        </div>
        <div class="pm-body" id="valuesBody"></div>
        <div class="pm-footer">
            <button class="btn" onclick="closeValuesModal()">Cancel</button>
            <button class="btn primary" onclick="saveValues()">Save Values</button>
        </div>
    </div>
</div>

<div id="importPayloadOverlay" class="pm-overlay" onclick="if(event.target===this)closeImportPayload()">
    <div class="pm-modal" style="width:520px;">
        <div class="pm-header">
            <h3>Import Payload</h3>
            <button class="pm-close" onclick="closeImportPayload()">✕</button>
        </div>
        <div class="pm-body" style="padding:14px;">
            <div style="font-size:10px;color:var(--text2);margin-bottom:8px;">Paste <code style="background:var(--bg2);padding:1px 4px;border-radius:3px;">{"schema":"...","values":"..."}</code> copied from PM Settings</div>
            <textarea id="importPayloadInput" style="width:100%;height:160px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:monospace;padding:8px;resize:vertical;outline:none;box-sizing:border-box;" placeholder='{"schema":"[...]","values":"{...}"}'></textarea>
        </div>
        <div class="pm-footer">
            <button class="btn" onclick="closeImportPayload()">Cancel</button>
            <button class="btn primary" onclick="confirmImportPayload()">Apply</button>
        </div>
    </div>
</div>

<script>
    var schedules  = [];
    var selectedId = null;
    var activeTab  = 'execution';
    var outputPoll = null;
    var formDirty  = false;
    var activeExecutorFilters = new Set();

    var _sseLog  = null;
    var _sseHttp = null;
    var _sseOutput = null;

    var curProject = '';
    var curTaskId  = '';
    var curRunId   = '';  // last_run_id для drill-down по конкретному прогону

    function getTaskStatus(s) {
        if (s.status === 'running') return 'running';

        var neverRan = !s.runs_total || parseInt(s.runs_total) === 0;
        if (neverRan) return 'newbie';

        var hasSchedule = !!((s.cron && s.cron.trim()) || (s.interval_minutes && parseInt(s.interval_minutes) > 0) || (s.fixed_time && s.fixed_time.trim()));
        var isPaused = s.enabled === 'false';

        if (hasSchedule) {
            return isPaused ? 'paused' : 'planned';
        } else {
            var isFail = s.status === 'error' || (s.last_exit && s.last_exit !== '0');
            return isFail ? 'fail' : 'done';
        }
    }

    function closeSse() {
        if (_sseLog)  { _sseLog.close();  _sseLog  = null; }
        if (_sseHttp) { _sseHttp.close(); _sseHttp = null; }
        if (_sseOutput) { _sseOutput.close(); _sseOutput = null; }

    }

    // В execIcon — альтернативно можно задать размер через обёртку:
    function execIcon(ex) {
        var svg = EXEC_ICONS[ex];
        if (!svg) return '<span style="font-size:9px;opacity:0.5">' + (ex || '?') + '</span>';
        var sized = svg.replace('<svg ', '<svg width="14" height="14" ');
        return '<span title="' + escHtml(ex) + '" style="display:inline-flex;align-items:center;opacity:0.7">' + sized + '</span>';
    }


    function startSse() {
        closeSse();
        if (!curTaskId) return;
        _sseLog = new EventSource('/logs/stream?task_id=' + encodeURIComponent(curTaskId));
        _sseLog.addEventListener('message', function(e) {
            try { appendLogRow(JSON.parse(e.data)); } catch(err) {}
        });
        _sseLog.onerror = function() { _sseLog.close(); _sseLog = null; };
        _sseHttp = new EventSource('/http-logs/stream?task_id=' + encodeURIComponent(curTaskId));
        _sseHttp.addEventListener('message', function(e) {
            try { appendHttpRow(JSON.parse(e.data)); } catch(err) {}
        });
        _sseHttp.onerror = function() { _sseHttp.close(); _sseHttp = null; };
    }

    function appendLogRow(row) {
        var el = document.getElementById('logsScroll');
        if (!el) return;
        var empty = el.querySelector('.log-empty');
        if (empty) empty.remove();
        var lvl    = (row.level || 'INFO').toUpperCase();
        var cls    = lvl === 'WARNING' ? 'WARN' : lvl;
        var time   = (row.timestamp || '').slice(11, 19);
        var msg    = row.message || '';
        var acc    = (row.account && row.account !== '-') ? row.account : '';
        var caller = (row.caller  && row.caller  !== '-') ? row.caller  : '';
        el.insertAdjacentHTML('beforeend',
            '<div class="log-row">'
            + '<span class="log-time">' + escHtml(time) + '</span>'
            + '<span class="log-level ' + cls + '">' + lvl.slice(0,4) + '</span>'
            + '<span class="log-acc"  title="' + escHtml(acc)    + '">' + escHtml(acc)    + '</span>'
            + '<span class="log-caller" title="' + escHtml(caller) + '">' + escHtml(caller) + '</span>'
            + '<span class="log-msg">' + escHtml(msg) + '</span>'
            + '</div>');
        el.scrollTop = el.scrollHeight;
    }

    function appendHttpRow(row) {
        var el = document.getElementById('httpScroll');
        if (!el) return;
        var empty = el.querySelector('.log-empty');
        if (empty) empty.remove();
        var sc  = row.statusCode || 0;
        var cls = sc >= 500 ? 's5xx' : sc >= 400 ? 's4xx' : 's2xx';
        var host = '';
        try { host = new URL(row.url || '').host; } catch(e) { host = row.url || ''; }
        var dur = row.durationMs != null ? row.durationMs + 'ms' : '';
        el.insertAdjacentHTML('beforeend',
            '<div class="http-row">'
            + '<span class="http-method">' + escHtml(row.method || '') + '</span>'
            + '<span class="http-status ' + cls + '">' + sc + '</span>'
            + '<span class="http-url" title="' + escHtml(row.url||'') + '">' + escHtml(host) + '</span>'
            + '<span class="http-dur">' + escHtml(dur) + '</span>'
            + '</div>');
        el.scrollTop = el.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadList().catch(function(e) {
            document.getElementById('listScroll').innerHTML =
                '<div style="padding:12px;color:red">Error: ' + e.message + '</div>';
        });
        initResizer();
        initHResizer();
        initVResizer();
        restoreLayout();
        document.getElementById('detailBody').addEventListener('input',  function() { formDirty = true; });
        document.getElementById('detailBody').addEventListener('change', function() { formDirty = true; });
    });


    /* ── Executor tag filter ── */
    function renderExecutorTags() {
        var bar = document.getElementById('execFilterBar');
        if (!bar) return;
        var counts = {};
        schedules.forEach(function(s) {
            var ex = s.executor || 'unknown';
            counts[ex] = (counts[ex] || 0) + 1;
        });
        var keys = Object.keys(counts).sort();
        if (keys.length <= 1) { bar.innerHTML = ''; return; }
        var html = '<span class="tag-filter-label">Exec:</span>';
        keys.forEach(function(ex) {
            var active = activeExecutorFilters.has(ex);
            html += '<span class="tag-chip' + (active ? ' active' : '') + '" onclick="toggleExecFilter(\'' + escHtml(ex) + '\')">'
                + escHtml(ex) + ' <span style="opacity:0.55">' + counts[ex] + '</span></span>';
        });
        if (activeExecutorFilters.size > 0) {
            html += '<span class="tag-chip clear-chip" onclick="clearExecFilters()">✕</span>';
        }
        bar.innerHTML = html;
    }
    function toggleExecFilter(ex) {
        if (activeExecutorFilters.has(ex)) activeExecutorFilters.delete(ex);
        else activeExecutorFilters.add(ex);
        renderExecutorTags();
        renderList();
    }
    function clearExecFilters() {
        activeExecutorFilters.clear();
        renderExecutorTags();
        renderList();
    }

    async function loadList() {
        var res = await fetch('/scheduler/list');
        if (!res.ok) throw new Error('/scheduler/list HTTP ' + res.status);
        schedules = await res.json();
        updateHeaderStats();
        renderExecutorTags();
        renderList();
        if (selectedId && !formDirty) {
            var still = schedules.find(function(s) { return s.id === selectedId; });
            if (still) {
                renderDetailActions(still);  // ← добавить
                if (activeTab !== 'output') renderDetail(still);
            }
        }else if (!selectedId) {
            var saved = (PageState.load()).selectedId;
            if (saved) {
                var s = schedules.find(function(x) { return x.id === saved; });
                if (s) { selectRow(s.id); return; }
            }
            renderGlobalStats();
        }
    }

    function updateHeaderStats() {
        var total   = schedules.length;
        var running = schedules.filter(function(s) { return s.status === 'running'; }).length;
        var errors  = schedules.filter(function(s) { return getTaskStatus(s) === 'fail'; }).length;
        var enabled = schedules.filter(function(s) { return s.enabled !== 'false'; }).length;
        document.getElementById('headerStats').innerHTML =
            '<div class="stat-item">Tasks: <span class="stat-val">' + total + '</span></div>'
            + '<div class="stat-item">Running: <span class="stat-val stat-running">' + running + '</span></div>'
            + '<div class="stat-item">Active: <span class="stat-val">' + enabled + '</span></div>'
            + (errors ? '<div class="stat-item">Errors: <span class="stat-val stat-error">' + errors + '</span></div>' : '');
    }

    /* ── List rendering with grouping ── */
    var collapsedGroups = new Set();
    var _groupsInitialized = false;
    function toggleGroup(grp) {
        if (collapsedGroups.has(grp)) collapsedGroups.delete(grp);
        else collapsedGroups.add(grp);
        renderList();
    }

    function triggerLabel(s) {
        if (s.cron && s.cron.trim())                                return s.cron.trim();
        if (s.interval_minutes && parseInt(s.interval_minutes) > 0) return 'every ' + s.interval_minutes + 'm';
        if (s.fixed_time && s.fixed_time.trim())                    return 'at ' + s.fixed_time.trim();
        return 'on demand';
    }

    function getGroupName(name) {
        if (!name) return '';
        var dot = name.indexOf('.');
        return dot > 0 ? name.substring(0, dot) : '';
    }

    function renderList() {
        var q  = document.getElementById('searchInput').value.toLowerCase();
        var el = document.getElementById('listScroll');
        var filtered = schedules.filter(function(s) {
            if (activeExecutorFilters.size > 0 && !activeExecutorFilters.has(s.executor || 'unknown')) return false;
            return !q
                || (s.name        && s.name.toLowerCase().indexOf(q)        >= 0)
                || (s.script_path && s.script_path.toLowerCase().indexOf(q) >= 0);
        });
        var countEl = document.getElementById('listCount');
        if (countEl) countEl.textContent = filtered.length;

        // Count members per group
        var groupCounts = {};
        filtered.forEach(function(s) {
            var g = getGroupName(s.name);
            if (g) groupCounts[g] = (groupCounts[g] || 0) + 1;
        });

        // Sort: grouped items (group size > 1) first, contiguous by group name; ungrouped last
        filtered.sort(function(a, b) {
            var ga = getGroupName(a.name), gb = getGroupName(b.name);
            var showA = ga && groupCounts[ga] > 1, showB = gb && groupCounts[gb] > 1;
            if (showA && !showB) return -1;
            if (!showA && showB) return 1;
            if (showA && showB) return ga < gb ? -1 : ga > gb ? 1 : 0;
            return 0;
        });

        if (!_groupsInitialized) {
            _groupsInitialized = true;
            Object.keys(groupCounts).forEach(function(g) {
                if (groupCounts[g] > 1) collapsedGroups.add(g);
            });
        }

        var html     = '';
        var lastGrp  = null;
        var firstUngrouped = true;

        filtered.forEach(function(s) {
            var grp      = getGroupName(s.name);
            var showGrp  = grp && groupCounts[grp] > 1;
            var collapsed = showGrp && collapsedGroups.has(grp);
            var shortName = showGrp && s.name.length > grp.length + 1
                ? s.name.substring(grp.length + 1)
                : s.name;

            if (showGrp && grp !== lastGrp) {
                var grpRunning = filtered.filter(function(x) {
                    return getGroupName(x.name) === grp && x.status === 'running';
                }).length;
                var dots = grpRunning > 0
                    ? Array(grpRunning).fill('<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green,#3fb950);margin-right:2px"></span>').join('')
                    : '';
                var isCollapsed = collapsedGroups.has(grp);
                html += '<div class="group-header" onclick="toggleGroup(\'' + grp + '\')">'
                    + '<span class="group-dot"></span>'
                    + '<span class="group-name">' + escHtml(grp) + '</span>'
                    + (dots ? '<span>' + dots + '</span>' : '')
                    + '<span class="group-count">' + groupCounts[grp] + '</span>'
                    + '<span class="group-chevron' + (isCollapsed ? ' collapsed' : '') + '">&#9660;</span>'
                    + '</div>';
                lastGrp = grp;
            } else if (!showGrp) {
                if (lastGrp !== null) firstUngrouped = true;
                if (firstUngrouped && lastGrp !== null) {
                    html += '<div class="ungrouped-separator"></div>';
                    firstUngrouped = false;
                }
                lastGrp = null;
            }

            if (collapsed) return;

            var status   = getTaskStatus(s);
            var disabled = s.enabled === 'false';
            var total    = parseInt(s.runs_total)   || 0;
            var done     = parseInt(s.runs_success) || 0;
            var trigger  = triggerLabel(s);
            var lastRun  = s.last_run ? s.last_run.slice(5, 16) : '';

            html += '<div class="schedule-row'
                + (showGrp ? ' group-child' : '')
                + (s.id === selectedId ? ' active' : '')
                + (disabled ? ' row-disabled' : '')
                + '" onclick="selectRow(\'' + s.id + '\')">'
                + '<span class="row-dot ' + (disabled ? 'disabled' : 'enabled')
                + '" title="' + (disabled ? 'Enable' : 'Disable')
                + '" onclick="event.stopPropagation();toggleEnabled(\'' + s.id + '\',\'' + s.enabled + '\')"></span>'
                + '<div class="row-info">'
                + '<div class="row-name">' + escHtml(showGrp ? shortName : (s.name || '(unnamed)')) + '</div>'
                + '<div class="row-sub">'
                + escHtml(trigger) + (lastRun ? ' · ' + lastRun : '') + '</div>'
                + '</div>'
                + '<div class="row-right">'
                + '<div style="display:flex;align-items:center;gap:4px">'
                + '<span class="task-status ' + status + '">' + status + '</span>'
                + '<span style="font-size:11px;" title="' + escHtml(s.executor||'') + '">' + execIcon(s.executor||'') + '</span>'
                + '</div>'
                + '<span class="row-counts"><span class="row-done">' + done + '</span><span class="row-total"> / ' + total + '</span></span>'
                + '</div>'
                + '</div>';
        });

        el.innerHTML = html || '<div style="padding:12px;color:var(--text2);text-align:center">No results</div>';
    }

    function filterList() { renderList(); }

    function deselect() {
        if (!selectedId) return;
        selectedId = null;
        formDirty  = false;
        stopProcStatsPoll();
        closeSse();
        PageState.save({ selectedId: null });
        renderList();
        renderGlobalStats();
    }

    var NAV_PAGES = [
        { icon: ICONS.scheduler,         title: 'z3nIO',      desc: 'Запуск .py, .js, .exe, .bat по cron, или интервалам (you are here)',                  url: '/scheduler.html',  color: '#e3b341' },
        { icon: ICONS.zp7, title: 'ZP7',        desc: 'Управление ZP7',                                                                      url: '/?page=zp7',       color: '#58a6ff' },
        { icon: ICONS.logs,        title: 'Logs',       desc: 'Логи приложения с фильтрацией по уровню, машине, проекту, аккаунту.',                 url: '/?page=logs',      color: '#3fb950' },
        { icon: ICONS.http,        title: 'HTTP',       desc: 'Перехваченные HTTP-запросы и ответы из ZP-задач. Replay запросов.',                   url: '/?page=http',      color: '#d29922' },
        { icon: ICONS.json,        title: 'JSON',       desc: 'Интерактивный JSON-tree с определением auth/captcha и replay запросов.',              url: '/json',            color: '#4e9eff' },
        { icon: ICONS.clips,        title: 'Clips',      desc: 'Copy-paste шаблоны, организованные в дерево. Клик по листу - копирует содержимое.',   url: '/?page=clips',     color: '#f0883e' },
        { icon: ICONS.text,        title: 'Text Tools', desc: 'URL encode/decode, C# escaper, Base64, JSON escape.',                                 url: '/text.html',       color: '#a371f7' },
        { icon: ICONS.config, title: 'Config',     desc: 'Статус сервера, редактор конфигурации, управление хранилищем логов.',                 url: '/?page=config',    color: '#f78166' },
    ];

    function renderGlobalStats() {
        document.getElementById('detailHeader').style.display  = 'none';
        document.getElementById('hResizer').style.display      = 'none';
        document.getElementById('bottomPanels').style.display  = 'none';
        var _dp = document.getElementById('detailPanel'); if (_dp) { _dp.style.flex = ''; _dp.style.height = ''; }

        var cards = NAV_PAGES.map(function(p) {
            return '<a class="nav-card" href="' + p.url + '" style="--card-color:' + p.color + '">'
                + '<div class="card-icon">' + p.icon + '</div>'
                + '<div class="card-title">' + p.title + '</div>'

    function renderExecution(s) {

        var fail       = total - done;

        var isRunning  = status === 'running';
        var isParallel = s.on_overlap === 'parallel';

        document.getElementById('detailBody').innerHTML =
            '<div class="detail-grid">'
            + '<div class="detail-section">'
            + '<div class="info-card-title">Execution</div>'
            + infoRow('Status',     '<span class="' + (isRunning ? 'green' : status === 'error' ? 'red' : '') + '">' + status + '</span>')
            + infoRow('Is Working', isRunning ? '<span class="green">Yes</span>' : 'No')
            + infoRow('Done',       '<span class="green">' + done + '</span>')
            + infoRow('Total',      total)
            + infoRow('Failed',     fail > 0 ? '<span class="red">' + fail + '</span>' : '0')
            + infoRow('Last Exit',  lastExit === '0' ? '<span class="green">0</span>' : (lastExit === '-1' ? '<span class="red">-1</span>' : lastExit))
            + (isRunning && !isParallel
                ? infoRow('PID',     '<span id="procPid"    class="accent">—</span>')
                + infoRow('Uptime',  '<span id="procUptime" class="accent">—</span>')
                + infoRow('Memory',  '<span id="procMem"    class="accent">—</span>')
                : '')
            + '</div>'
            + '<div class="detail-section">'
            + '<div class="info-card-title">Scheduler</div>'
            + infoRow('Active',      s.enabled !== 'false' ? '<span class="green">True</span>' : '<span class="red">False</span>')
            + infoRow('Last Run',    lastRun)
            + infoRow('Period',      trigger)
            + infoRow('On Overlap',  s.on_overlap || '—')
            + (isParallel ? infoRow('Max Threads', s.max_threads || '1') : '')
            + infoRow('Executor',    s.executor || '—')
            + '</div>'
            + (isRunning && isParallel
                ? '<div class="detail-section" id="instancesCard"><div class="info-card-title">Active instances</div><div id="instancesList">—</div></div>'
                + '<div class="detail-section" id="queueCard"><div class="info-card-title">Queue (pending)</div><div id="queueList">—</div><button class="btn sm" style="margin-top:4px" onclick="clearQueue(\'' + escHtml(s.id) + '\')">Clear queue</button></div>'
                : '')
            + '</div>';

        if (isRunning) {
            var id = s.id;

            function pollStats() {
                fetch('/scheduler/process-stats?id=' + encodeURIComponent(id))
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        var elPid    = document.getElementById('procPid');
                        var elUptime = document.getElementById('procUptime');
                        var elMem    = document.getElementById('procMem');
                        if (!elPid) { stopProcStatsPoll(); return; }
                        if (!d.running) { stopProcStatsPoll(); return; }
                        elPid.textContent    = d.pid > 0 ? d.pid : '—';
                        elUptime.textContent = d.uptimeSec + 's';
                        elMem.textContent    = d.memoryMB + ' MB';
                    })
                    .catch(function() {});
            }

            function pollInstances() {
                fetch('/scheduler/instances?id=' + encodeURIComponent(id))
                    .then(function(r) { return r.json(); })
                    .then(function(list) {
                        var el = document.getElementById('instancesList');
                        if (!el) return;
                        if (!list || !list.length) { el.innerHTML = '(none)'; return; }
                        el.innerHTML = list.map(function(inst) {
                            return '<div style="display:flex;align-items:center;gap:6px;margin:2px 0">'
                                + '<span class="accent" style="font-family:monospace;font-size:10px">' + escHtml(inst.runId) + '</span>'
                                + '<span style="color:var(--text2)">' + inst.uptimeSec + 's</span>'
                                + '<span style="color:var(--text2)">' + inst.memoryMB + 'MB</span>'
                                + '<button class="btn stop sm" onclick="killOneInstance(\'' + escHtml(id) + '\',\'' + escHtml(inst.runId) + '\')">✕</button>'
                                + '</div>';
                        }).join('');
                    })
                    .catch(function() {});

                fetch('/scheduler/queue?id=' + encodeURIComponent(id))
                    .then(function(r) { return r.json(); })
                    .then(function(list) {
                        var el = document.getElementById('queueList');
                        if (!el) return;
                        var pending = (list || []).filter(function(q) { return q.status === 'pending'; });
                        el.textContent = pending.length ? pending.length + ' pending' : '(empty)';
                    })
                    .catch(function() {});
            }

            if (!isParallel) pollStats();
            if (isParallel)  pollInstances();
            _procStatsPoll = setInterval(function() {
                if (!isParallel) pollStats();
                if (isParallel)  pollInstances();
            }, 2000);
        }
    }

    /* ── Schedule builder (unchanged logic) ── */
    function schedBuilderPeriodFromSaved(s) {
        if (s.interval_minutes && parseInt(s.interval_minutes) > 0) return 'Interval';
        if (!s.cron) return 'OnDemand';
        var parts = s.cron.trim().split(/\s+/);
        if (parts.length !== 5) return 'OnDemand';
        var h = parts[1], dom = parts[2], dow = parts[4];
        if (dow !== '*') return 'EveryWeek';
        if (dom !== '*' && dom !== '?') return 'EveryMonth';
        if (h !== '*') return 'EveryDay';
        return 'OnDemand';
    }
    function schedBuilderTimesFromSaved(s) {
        if (!s.cron) return '';
        var parts = s.cron.trim().split(/\s+/);
        if (parts.length !== 5) return '';
        var min = parts[0], h = parts[1];
        if (h === '*' || min === '*') return '';
        var mins = min.split(','), hours = h.split(',');
        if (mins.length === 1 && hours.length >= 1)
            return hours.map(function(hh) { return pad2(hh) + ':' + pad2(mins[0]); }).join(', ');
        return '';
    }
    function schedBuilderWeekdayActive(s, bit) {
        if (!s.cron) return false;
        var parts = s.cron.trim().split(/\s+/);
        if (parts.length !== 5) return false;
        return parts[4].split(',').indexOf(String(bit)) >= 0;
    }
    function schedBuilderMonthdayFromSaved(s) {
        if (!s.cron) return '';
        var parts = s.cron.trim().split(/\s+/);
        if (parts.length !== 5) return '';
        var dom = parts[2];
        return (dom !== '*' && dom !== '?') ? dom : '';
    }
    function schedBuilderIntervalFromSaved(s) {
        return (s.interval_minutes && parseInt(s.interval_minutes) > 0) ? s.interval_minutes : '';
    }
    function builderClear() {
        var el = document.getElementById('b_period');
        if (el) { el.value = 'OnDemand'; builderShowRows('OnDemand'); }
    }
    function toggleWeekday(el) { el.classList.toggle('wd-on'); builderUpdate(); }
    function builderShowRows(period) {
        var showTime     = ['EveryDay','EveryWeek','EveryMonth'].indexOf(period) >= 0;
        var showWeekday  = period === 'EveryWeek';
        var showMonthday = period === 'EveryMonth';
        var showInterval = period === 'Interval';
        setRowVisible('b_time_row', showTime); setRowVisible('b_time_wrap', showTime);
        setRowVisible('b_weekday_row', showWeekday); setRowVisible('b_weekday_wrap', showWeekday);
        setRowVisible('b_monthday_row', showMonthday); setRowVisible('b_monthday_wrap', showMonthday);
        setRowVisible('b_interval_row', showInterval); setRowVisible('b_interval_wrap', showInterval);
    }
    function setRowVisible(id, show) { var el = document.getElementById(id); if (el) el.style.display = show ? '' : 'none'; }
    function builderUpdate() {
        var period = (document.getElementById('b_period') || {}).value || 'OnDemand';
        builderShowRows(period);
        if (period === 'OnDemand') return;
        if (period === 'Interval') {
            var mins = parseInt((document.getElementById('b_interval') || {}).value || '0');
            setCronField(''); setIntervalField(mins > 0 ? mins : 0); return;
        }
        var timesRaw  = ((document.getElementById('b_times') || {}).value || '').trim();
        var timesList = timesRaw ? timesRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : ['00:00'];
        if (timesList.length > 1) {
            var minutes = timesList.map(function(t) { var p = parseHHMM(t); return p.h * 60 + p.m; }).sort(function(a,b){return a-b;});
            var gaps = [];
            for (var i = 1; i < minutes.length; i++) gaps.push(minutes[i] - minutes[i-1]);
            var minGap = gaps.reduce(function(a,b){return Math.min(a,b);}, gaps[0] || 60);
            setCronField(''); setIntervalField(Math.max(1, minGap)); return;
        }
        var t = parseHHMM(timesList[0]);
        var cron = '';
        if (period === 'EveryDay')   cron = t.m + ' ' + t.h + ' * * *';
        else if (period === 'EveryWeek') {
            var days = []; document.querySelectorAll('#b_weekdays .wd-btn.wd-on').forEach(function(b){days.push(b.getAttribute('data-bit'));});
            cron = t.m + ' ' + t.h + ' * * ' + (days.length ? days.join(',') : '*');
        } else if (period === 'EveryMonth') {
            var dom = parseInt((document.getElementById('b_monthday') || {}).value || '1');
            if (!dom || dom < 1 || dom > 28) dom = 1;
            cron = t.m + ' ' + t.h + ' ' + dom + ' * *';
        }
        setCronField(cron); setIntervalField(0);
    }
    function setCronField(v)     { var el = document.getElementById('f_cron');             if (el) el.value = v; }
    function setIntervalField(v) { var el = document.getElementById('f_interval_minutes'); if (el) el.value = v || 0; }
    function parseHHMM(str)      { var p = (str || '00:00').split(':'); return { h: parseInt(p[0])||0, m: parseInt(p[1])||0 }; }
    function pad2(n)             { return String(parseInt(n)||0).padStart(2,'0'); }

    function renderOutputLines(text) {
        if (!text || !text.trim()) return '<div class="out-line empty">(no output yet)</div>';
        var normalized = text.replace(/\\n/g, '\n');
        return normalized.split('\n').map(function(line) {
            var level = 'INFO';
            if (/\[ERROR\]|\[ERR\]/i.test(line))        level = 'ERROR';
            else if (/\[WARNING\]|\[WARN\]/i.test(line)) level = 'WARNING';
            else if (/\[DEBUG\]/i.test(line))            level = 'DEBUG';
            return '<div class="out-line ' + level + '">' + escHtml(line) + '</div>';
        }).join('');
    }

    function loadOutput(id) {
        clearOutputPoll();
        var box   = document.getElementById('outputBox');
        var badge = document.getElementById('liveBadge');
        if (!box) return;
        //box.innerHTML = '<div class="out-line empty">Connecting...</div>';

        _sseOutput = new EventSource('/scheduler/output/stream?id=' + encodeURIComponent(id));

        _sseOutput.addEventListener('output', function(e) {
            try {
                var d = JSON.parse(e.data);
                if (d.done) {
                    if (badge) badge.style.display = 'none';
                    return;
                }
                if (d.clear) { box.innerHTML = ''; }  // опционально: сброс при новом запуске
                var empty = box.querySelector('.out-line.empty');
                if (empty) empty.remove();
                var level = (d.level || 'INFO').toUpperCase();
                var atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 40;
                var line = d.line || '';
                var last = box.lastElementChild;
                function progressPrefix(s) { return s.replace(/[\d%\[\]]+.*$/, '').trim(); }
                if (last && last.classList.contains('out-line') && !last.classList.contains('empty')
                    && progressPrefix(line).length > 3
                    && progressPrefix(line) === progressPrefix(last.textContent)) {
                    last.className = 'out-line ' + level;
                    last.textContent = line;
                } else {
                    box.insertAdjacentHTML('beforeend',
                        '<div class="out-line ' + level + '">' + escHtml(line) + '</div>');
                }
                if (atBottom) box.scrollTop = box.scrollHeight;
                if (badge) badge.style.display = 'inline-block';
            } catch(err) {}
        });

        _sseOutput.addEventListener('done', function(e) {
            if (badge) badge.style.display = 'none';
            _sseOutput.close(); _sseOutput = null;
        });

        _sseOutput.onerror = function() {
            if (badge) badge.style.display = 'none';
            _sseOutput.close(); _sseOutput = null;
            if (box.innerHTML === '<div class="out-line empty">Connecting...</div>')

    async function loadLogs() {

        var level    = document.getElementById('logLevel').value;
        var limit    = document.getElementById('logLimit').value || 50;
        var onlyRun  = document.getElementById('logOnlyRun') && document.getElementById('logOnlyRun').checked;
        var session  = (onlyRun && curRunId) ? curRunId : '';
        var url = '/logs?limit=' + limit
            + '&task_id=' + encodeURIComponent(curTaskId)
            + (level   ? '&level='   + encodeURIComponent(level)   : '')
            + (session ? '&session=' + encodeURIComponent(session)  : '');
        try {
            var res  = await fetch(url);
            var data = await res.json();
            var el   = document.getElementById('logsScroll');
            if (!data.length) { await showOutputFallback(el); return; }
            el.innerHTML = data.slice().reverse().map(function(row) {
                var lvl    = (row.level || 'INFO').toUpperCase();
                var cls    = lvl === 'WARNING' ? 'WARN' : lvl;
                var time   = (row.timestamp || '').slice(11, 19);
                var msg    = row.message || '';
                var acc    = (row.account && row.account !== '-') ? row.account : '';
                var caller = (row.caller  && row.caller  !== '-') ? row.caller  : '';
                return '<div class="log-row">'
                    + '<span class="log-time">' + escHtml(time) + '</span>'
                    + '<span class="log-level ' + cls + '">' + lvl.slice(0,4) + '</span>'
                    + '<span class="log-acc"   title="' + escHtml(acc)    + '">' + escHtml(acc)    + '</span>'
                    + '<span class="log-caller" title="' + escHtml(caller) + '">' + escHtml(caller) + '</span>'
                    + '<span class="log-msg">' + escHtml(msg) + '</span>'
                    + '</div>';
            }).join('');
            el.scrollTop = el.scrollHeight;
        } catch(e) {}
    }

    async function showOutputFallback(el) {
        if (!selectedId || selectedId === '__new__') {
            el.innerHTML = '<div class="log-empty">No logs</div>';
            return;
        }
        try {
            var res  = await fetch('/scheduler/output?id=' + encodeURIComponent(selectedId));
            var data = await res.json();
            var text = (data && data.output) ? data.output.trim() : '';

            el.innerHTML = '<div class="log-row" style="opacity:0.45;font-size:9px;padding:2px 8px;border-bottom:1px solid var(--border)">'
                + '<span class="log-msg">— no logger output, showing task stdout —</span>'

                + text.split('\n').map(function(line) {
                    return '<div class="log-row">'
                        + '<span class="log-msg" style="white-space:pre-wrap">' + escHtml(line) + '</span>'
                        + '</div>';

        } catch(e) {
            el.innerHTML = '<div class="log-empty">No logs</div>';

    function _nextDuplicateName(name, existingNames) {
        var match = name.match(/^(.*)\s\((\d+)\)$/);
        var base  = match ? match[1] : name;
        var n     = match ? parseInt(match[2]) : 1;
        var candidate;
        do { n++; candidate = base + ' (' + n + ')'; } while (existingNames.indexOf(candidate) >= 0);
        return candidate;
    }

    async function duplicateSchedule(id) {
        var s = schedules.find(function(x) { return x.id === id; });
        if (!s) return;

        var existingNames = schedules.map(function(x) { return x.name || ''; });
        var newName = _nextDuplicateName(s.name || 'task', existingNames);

        var taskPayload = {
            name:             newName,
            executor:         s.executor,
            script_path:      s.script_path,
            args:             s.args,
            enabled:          'false',
            cron:             s.cron,
            interval_minutes: s.interval_minutes,
            fixed_time:       s.fixed_time,
            on_overlap:       s.on_overlap,
            max_threads:      s.max_threads,
        };

        var res  = await fetch('/scheduler/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(taskPayload) });
        var data = await res.json();
        if (!data.ok) { Dialog.error(data.error || 'Duplicate: save failed'); return; }

        var newId = data.id;

        try {
            var pRes  = await fetch('/scheduler/payload?id=' + encodeURIComponent(id));
            var pData = await pRes.json();
            if (pData.schema || pData.values) {
                await fetch('/scheduler/payload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: newId, schema: pData.schema, values: pData.values })

            }
        } catch(e) {}

        await loadList();
        selectRow(newId);
    }

    async function stopNow(id) {
        var res       = await fetch('/scheduler/instances?id=' + encodeURIComponent(id));
        var instances = await res.json().catch(function() { return []; });
        instances     = instances || [];

        if (instances.length === 0) {
            // нет активных инстансов — просто kill (на случай зависшей записи)
            await fetch('/scheduler/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) });
        } else if (instances.length === 1) {
            var ok = await Dialog.confirm('Kill running instance?', '■ Interrupt', true);
            if (!ok) return;
            await fetch('/scheduler/kill-instance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id, runId: instances[0].runId }) });
        } else {
            // несколько инстансов — показываем список
            var chosen = await _pickInstanceToKill(id, instances);
            if (chosen === null) return;  // отмена
            if (chosen === '__all__') {
                await fetch('/scheduler/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) });
            } else {
                await fetch('/scheduler/kill-instance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id, runId: chosen }) });
            }
        }

        await loadList();
    }

        });
    }

    function initResizer() {
        var resizer = document.getElementById('resizer');
        var panel   = document.getElementById('tasksPanel');
        var dragging = false, startX, startW;
        resizer.addEventListener('mousedown', function(e) {
            dragging = true; startX = e.clientX; startW = panel.offsetWidth;
            document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            panel.style.width = Math.max(180, startW + (e.clientX - startX)) + 'px';
        });
        document.addEventListener('mouseup', function() {
            if (dragging) {
                dragging = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                PageState.save({ listW: panel.offsetWidth });
            }
        });
    }

    /* ── Horizontal resizer (detailPanel ↕ bottomPanels) ── */
    function initHResizer() {
        var resizer     = document.getElementById('hResizer');
        var topPanel    = document.getElementById('detailPanel');
        var bottomPanel = document.getElementById('bottomPanels');
        if (!resizer) return;
        var dragging = false, startY, startTop, startBottom;
        resizer.addEventListener('mousedown', function(e) {
            dragging    = true;
            startY      = e.clientY;
            startTop    = topPanel.offsetHeight;
            startBottom = bottomPanel.offsetHeight;
            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var dy      = e.clientY - startY;
            var newTop  = Math.max(100, startTop + dy);
            var newBot  = Math.max(80, startBottom - dy);
            topPanel.style.flex   = 'none';
            topPanel.style.height = newTop + 'px';
            bottomPanel.style.height = newBot + 'px';
        });
        document.addEventListener('mouseup', function() {
            if (dragging) {
                dragging = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                PageState.save({ detailH: topPanel.offsetHeight, bottomH: bottomPanel.offsetHeight });
            }
        });
    }

    /* ── Vertical resizer inside bottom-panels (Logs ↔ HTTP) ── */
    function initVResizer() {
        var resizer    = document.getElementById('vResizer');
        var leftPanel  = document.getElementById('logPanelLogs');
        var rightPanel = document.getElementById('logPanelHttp');
        var container  = document.getElementById('bottomPanels');
        if (!resizer) return;
        var dragging = false;
        resizer.addEventListener('mousedown', function(e) {
            dragging = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var rect = container.getBoundingClientRect();
            var pct  = ((e.clientX - rect.left) / rect.width) * 100;
            pct = Math.max(15, Math.min(85, pct));
            leftPanel.style.flex  = '0 0 ' + pct + '%';
            rightPanel.style.flex = '1 1 0';
        });
        document.addEventListener('mouseup', function() {
            if (dragging) {
                dragging = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                var raw = leftPanel.style.flexBasis || '';
                var pct = raw ? parseFloat(raw) : (leftPanel.offsetWidth / container.offsetWidth * 100);
                PageState.save({ logsFlexPct: Math.round(pct) });
            }
        });
    }

            return new Promise(function(r) { self._resolve = r; });
        },
        _close: function(val) {

            if (this._resolve) { this._resolve(val); this._resolve = null; }
        },
        _buttons: function(btns) {
            document.getElementById('dialogButtons').innerHTML = btns.map(function(b) {
                return '<button class="btn ' + b.cls + '" onclick="Dialog._close(' + JSON.stringify(b.val) + ')">' + b.label + '</button>';
            }).join('');
        },
        alert:   function(msg, title) { this._buttons([{ label:'OK', cls:'primary', val:true }]); return this._open('i', title||'Info', msg, 'alert'); },
        confirm: function(msg, title, danger) { this._buttons([{label:'Cancel',cls:'',val:false},{label:'Confirm',cls:danger?'danger':'primary',val:true}]); return this._open('?', title||'Confirm', msg, 'confirm'); },
        error:   function(msg, title) { return this.alert(msg, title||'Error'); }
